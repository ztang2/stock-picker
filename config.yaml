default_strategy: balanced

# These weights are OVERRIDDEN by strategy weights in src/strategies.py
# Actual balanced weights: fund=0.26, val=0.17, tech=0.22, risk=0.08, growth=0.12, sent=0.05, sector_rel=0.10
# This config is kept for reference; auto_optimize writes overrides to data/weight_overrides.json
weights:
  fundamentals: 0.26
  valuation: 0.17
  technicals: 0.22
  risk: 0.08
  growth: 0.12
  sentiment: 0.05
  sector_relative: 0.10

thresholds:
  min_market_cap: 2.0e9
  min_volume: 500000

filters:
  sectors: []
  industries: []
  min_market_cap: null
  max_market_cap: null
  exclude_tickers: []

cache_hours: 24
top_n: 20
